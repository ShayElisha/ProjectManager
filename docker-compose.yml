services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - nexus_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - mongosh
      - --host
      - mongo:27017
      - --eval
      - |
        try {
          rs.status();
        } catch (e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
        }

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  nexus_mongo:
